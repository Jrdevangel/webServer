services:

  postgres:
    image: postgres:16
    container_name: postgres-webserver
    restart: unless-stopped

    environment:
      POSTGRES_DB: webserver_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d webserver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - webserver_net

  backend:
    build: ./BackEnd
    container_name: backend-webserver
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webserver_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

    networks:
      - webserver_net

  frontend:
    build: ./FrontEnd
    container_name: frontend-webserver
    restart: unless-stopped

    depends_on:
      - backend

    networks:
      - webserver_net

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile

    depends_on:
      - backend
      - frontend

    networks:
      - webserver_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  webserver_net:
    driver: bridge