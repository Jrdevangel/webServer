spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/webserver_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    admin:
      username: admin
      password: admin123

logging:
  level:
    org.springframework: DEBUG
    org.hibernate.SQL: DEBUG